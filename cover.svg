<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Cover image: The Multilingual Tokenization Tax. Why your LLM bill is 5x larger in any non-English language.">
  <title>The Multilingual Tokenization Tax</title>
  <desc>Cover image showing a 4.81 times ratio between English-trained and Arabic-trained tokenizers as a worked example of the multilingual tokenization tax.</desc>

  <defs>
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#0a0e1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0e1a"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#sheen)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">

    <line x1="80" y1="108" x2="118" y2="108" stroke="#f59e0b" stroke-width="2"/>
    <text x="132" y="113" font-size="13" fill="#f59e0b" letter-spacing="3" font-weight="500">DEEP DIVE  ·  TOKENIZATION</text>

    <text x="80" y="200" font-size="58" fill="#ffffff" font-weight="500" letter-spacing="-1.5">The Multilingual</text>
    <text x="80" y="266" font-size="58" fill="#ffffff" font-weight="500" letter-spacing="-1.5">Tokenization Tax</text>

    <text x="80" y="324" font-size="22" fill="#94a3b8" font-weight="400">Why your LLM bill is 5× larger</text>
    <text x="80" y="354" font-size="22" fill="#94a3b8" font-weight="400">in any non-English language</text>

    <line x1="80" y1="498" x2="200" y2="498" stroke="#1e293b" stroke-width="1"/>
    <text x="80" y="525" font-size="14" fill="#cbd5e1" font-weight="500">Mohammed Hafeez Ali Khan</text>
    <text x="80" y="548" font-size="13" fill="#64748b" font-weight="400">Senior AI Solutions Architect</text>

    <g transform="translate(680, 130)">

      <text x="0" y="0" font-size="11" fill="#64748b" letter-spacing="2.5" font-weight="500">WORKED EXAMPLE · 1KB ARABIC SAMPLE</text>

      <text x="0" y="44" font-size="14" fill="#94a3b8" font-weight="400">English-trained tokenizer</text>
      <rect x="0" y="56" width="420" height="22" rx="3" fill="#1e293b"/>
      <rect x="0" y="56" width="420" height="22" rx="3" fill="#475569"/>
      <text x="20" y="72" font-size="13" fill="#ffffff" font-weight="500">1,838 tokens</text>

      <text x="0" y="118" font-size="14" fill="#94a3b8" font-weight="400">Arabic-trained tokenizer</text>
      <rect x="0" y="130" width="87" height="22" rx="3" fill="#f59e0b"/>
      <text x="97" y="146" font-size="13" fill="#fbbf24" font-weight="500">382 tokens</text>

      <line x1="0" y1="196" x2="60" y2="196" stroke="#f59e0b" stroke-width="2"/>
      <text x="0" y="298" font-size="120" fill="#f59e0b" font-weight="500" letter-spacing="-4">4.81×</text>
      <text x="0" y="332" font-size="13" fill="#94a3b8" font-weight="400" letter-spacing="0.5">more tokens · more cost · same content</text>

      <text x="0" y="380" font-size="12" fill="#475569" font-weight="400">The pattern repeats for Hindi, Chinese, Japanese, Russian, Thai.</text>
    </g>

  </g>
</svg>
